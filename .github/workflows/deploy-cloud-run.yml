name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: # cho phép chạy thủ công từ GitHub UI

env:
  PROJECT_ID: my-application-sign-7bed2
  REGION: asia-southeast1
  SERVICE_NAME: sign-language-api
  AR_REPO: cloud-run

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cần cho Workload Identity Federation

    steps:
      # ---- 1. Checkout code ----
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 2. Authenticate to Google Cloud ----
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ---- 3. Setup gcloud CLI ----
      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ---- 4. Build on Google Cloud Build (8 CPU, fast gRPC compile) ----
      - name: Build & Push via Cloud Build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}"
          gcloud builds submit \
            --tag "${IMAGE}:${{ github.sha }}" \
            --machine-type=e2-highcpu-8 \
            --timeout=1800 \
            --quiet
          # Tag as latest
          gcloud artifacts docker tags add \
            "${IMAGE}:${{ github.sha }}" \
            "${IMAGE}:latest" \
            --quiet

      # ---- 5. Deploy to Cloud Run ----
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --port=8080
          env_vars: |
            APP_NAME=SignLanguageAI
            APP_ENV=production
            APP_DEBUG=false
            APP_KEY=${{ secrets.APP_KEY }}
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GOOGLE_APPLICATION_CREDENTIALS=/var/www/html/storage/app/keys/firestore-service-account.json
            FIRESTORE_TRANSPORT=rest
            LOG_CHANNEL=stderr
            SESSION_DRIVER=cookie
            CACHE_STORE=file
          secrets: |
            GOOGLE_CREDENTIALS_JSON=firestore-service-account:latest

      # ---- 7. Show deployed URL ----
      - name: Show Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "### Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: ${URL}"
